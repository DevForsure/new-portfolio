<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0920"/>
      <stop offset="100%" stop-color="#1c0f38"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.15
                0 0 0 0 1
                0 0 0 1.4 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="64" height="64" rx="13" ry="13" fill="url(#bg)"/>
  <rect x="0" y="0" width="64" height="64" rx="13" ry="13" fill="url(#innerGlow)"/>
  <!-- Border -->
  <rect x="1" y="1" width="62" height="62" rx="12" ry="12"
        fill="none" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Letters -->
  <g filter="url(#glow)">
    <!-- Y: centered in left half (x: 4–32) -->
    <!-- Left arm -->
    <line x1="6"  y1="17" x2="17" y2="31" stroke="url(#letterGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="28" y1="17" x2="17" y2="31" stroke="url(#letterGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Stem -->
    <line x1="17" y1="31" x2="17" y2="47" stroke="url(#letterGrad)" stroke-width="4" stroke-linecap="round"/>

    <!-- G: centered in right half (x: 34–62), center at (48, 32) radius ~10 -->
    <!-- Arc: almost full circle, open on the right center, from 270° going clockwise back to ~90° with a notch -->
    <!-- Top of G to bottom, going counterclockwise (open on right) -->
    <path d="M 48 22 A 10 10 0 1 0 48 42" fill="none" stroke="url(#letterGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Horizontal middle bar of G pointing inward -->
    <line x1="48" y1="32" x2="57" y2="32" stroke="url(#letterGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Vertical drop on the right side of G -->
    <line x1="57" y1="32" x2="57" y2="42" stroke="url(#letterGrad)" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>